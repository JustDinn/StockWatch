<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; }
    #chart { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script src="https://unpkg.com/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    var chart = LightweightCharts.createChart(document.getElementById('chart'), {
      layout: {
        background: { type: 'solid', color: 'transparent' },
        textColor: '#888888'
      },
      grid: {
        vertLines: { color: 'rgba(128,128,128,0.15)' },
        horzLines: { color: 'rgba(128,128,128,0.15)' }
      },
      localization: {
        dateFormat: 'yyyy-MM-dd'
      },
      timeScale: {
        borderColor: 'rgba(128,128,128,0.3)',
        timeVisible: false
      },
      rightPriceScale: {
        borderColor: 'rgba(128,128,128,0.3)'
      },
      handleScroll: true,
      handleScale: true
    });

    var candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#1976d2',
      borderUpColor: '#ef5350',
      borderDownColor: '#1976d2',
      wickUpColor: '#ef5350',
      wickDownColor: '#1976d2'
    });

    function setColors(bodyUp, bodyDown, borderUp, borderDown, wickUp, wickDown) {
      candleSeries.applyOptions({
        upColor: bodyUp,
        downColor: bodyDown,
        borderUpColor: borderUp,
        borderDownColor: borderDown,
        wickUpColor: wickUp,
        wickDownColor: wickDown
      });
    }

    var isReady = false;

    function setData(jsonString) {
      try {
        var data = JSON.parse(jsonString);
        isReady = false;
        candleSeries.setData(data);
        chart.timeScale().fitContent();
        setTimeout(function() { isReady = true; }, 600);
      } catch (e) {
        console.error('차트 데이터 오류:', e);
      }
    }

    function appendOlderData(jsonString) {
      try {
        var olderData = JSON.parse(jsonString);
        var currentData = candleSeries.data();
        var merged = olderData.concat(currentData);
        var seen = {};
        merged = merged.filter(function(d) {
          if (seen[d.time]) return false;
          seen[d.time] = true;
          return true;
        });
        merged.sort(function(a, b) { return a.time - b.time; });
        var visibleRange = chart.timeScale().getVisibleLogicalRange();
        candleSeries.setData(merged);
        if (visibleRange) {
          var addedCount = merged.length - currentData.length;
          chart.timeScale().setVisibleLogicalRange({
            from: visibleRange.from + addedCount,
            to: visibleRange.to + addedCount
          });
        }
      } catch (e) {
        console.error('과거 데이터 추가 오류:', e);
      }
    }

    var edgeDebounceTimer = null;
    chart.timeScale().subscribeVisibleLogicalRangeChange(function(range) {
      if (!range || !isReady) return;
      if (range.from <= 2) {
        if (edgeDebounceTimer) return;
        edgeDebounceTimer = setTimeout(function() {
          edgeDebounceTimer = null;
          if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.chartEdge) {
            window.webkit.messageHandlers.chartEdge.postMessage('reachedLeftEdge');
          }
        }, 500);
      }
    });

    window.addEventListener('resize', function() {
      chart.applyOptions({
        width: document.getElementById('chart').clientWidth,
        height: document.getElementById('chart').clientHeight
      });
    });
  </script>
</body>
</html>
